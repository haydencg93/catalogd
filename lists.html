<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogd | My Lists</title>
    <link rel="stylesheet" href="stylingIndex.css">
    <link rel="stylesheet" href="stylingProfile.css">
    <link rel="stylesheet" href="stylingLists.css">
    <link rel="icon" type="image/x-icon" href="catalogdFavicon.png" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="css-logo" onclick="window.location.href='index.html'">
            <div class="logo-text">catalog<span>d</span></div>
            <div class="logo-circles">
                <div class="circle c-movie"></div>
                <div class="circle c-tv"></div>
                <div class="circle c-book"></div>
                <div class="circle c-album"></div>
                <div class="circle c-youtube"></div>
            </div>
        </div>
        <div class="nav-actions">
            <button id="login-btn" class="secondary-btn">Sign In</button>
            <div id="profile-menu" class="profile-dropdown" style="display:none;">
                <button class="profile-trigger" onclick="toggleProfileDropdown(event)">
                    <img src="https://ui-avatars.com/api/?name=User&background=0d0776&color=fff" id="nav-avatar" alt="Profile">
                    <span class="dropdown-arrow"></span>
                </button>
                <div id="dropdown-content" class="dropdown-content">
                    <a href="index.html">Home</a>
                    <a href="diary.html">Diary</a>
                    <a href="lists.html">Lists</a>
                    <a href="watchlist.html">Watchlist</a>
                    <a href="stats.html">Stats</a>
                    <a href="profile.html">Profile</a>
                    <a href="settings.html">Settings</a>
                    <hr>
                    <a href="#" onclick="signOut()">Sign Out</a>
                </div>
            </div>
        </div>
    </header>

    <main class="profile-container">
        <h1>My Lists</h1>
        
        <section class="create-list-section">
            <h3>Create New List</h3>
            <div class="input-group" style="align-items: center; gap: 15px;">
                <input type="text" id="list-name-input" placeholder="List Name (e.g., Best Sci-Fi 2024)">
                
                <div class="tiered-toggle-wrapper" style="display: flex; align-items: center; gap: 8px;">
                    <input type="checkbox" id="create-tiered-toggle" style="width: 18px; height: 18px; accent-color: var(--accent); margin: 0; cursor: pointer;">
                    <label for="create-tiered-toggle" style="color: white; font-size: 0.9rem; font-weight: bold; cursor: pointer; white-space: nowrap;">Tiered List</label>
                </div>

                <button id="create-list-btn" class="primary-btn" style="width: auto; white-space: nowrap;">Create List</button>
            </div>
        </section>

        <!-- Centered Filter Tabs & Reorder Controls -->
        <div style="display: flex; flex-direction: column; align-items: center; margin-bottom: 20px;">
            <div class="filter-nav" id="lists-filter-nav" style="justify-content: center; flex-wrap: wrap;">
                <button class="filter-btn active" onclick="filterLists('owned')">Owned</button>
                <button class="filter-btn" onclick="filterLists('shared')">Shared with Me</button>
                <button class="filter-btn" onclick="filterLists('tier')">Tier Lists</button>
            </div>

            <div style="margin-top: 15px; display: flex; gap: 10px;">
                <button id="manage-lists-btn" class="secondary-btn" style="display:none; width:auto; padding: 8px 16px;">Reorder Lists</button>
                <button id="save-lists-order-btn" class="primary-btn" style="display:none; width:auto; padding: 8px 16px;">Save Order</button>
            </div>
        </div>

        <div id="lists-container" class="list-grid">
            <p class="meta">Loading your lists...</p>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="scriptingLists.js"></script>
</body>
</html>

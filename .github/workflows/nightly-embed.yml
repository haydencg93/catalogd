name: Nightly ML Embedding Pipeline Worker

on:
  push:
    branches:
      - main 
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  embed_media:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          cd seederAi
          rm -rf node_modules # <-- Deletes your Windows files from the server
          npm install @supabase/supabase-js @qdrant/js-client-rest @xenova/transformers dotenv ws

      - name: Run ML Generator
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
        run: |
          cd seederAi
          node generate_embeddings.js
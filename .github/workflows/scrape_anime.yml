name: Anime Filler Scraper Worker

on:
  workflow_dispatch:
    inputs:
      anime_name:
        description: 'Anime name to scrape (Leave blank to check Supabase queue)'
        required: false
        default: ''
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  build_and_scrape:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./animeFillerListApi

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run Scraper Worker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node index.js "${{ github.event.inputs.anime_name }}"

      - name: Commit and Push New JSON Data
        # --- ADDED THIS TO ESCAPE THE SUBFOLDER FOR GIT ---
        working-directory: .
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add animeFillerListApi/data/*.json
          git commit -m "Auto-updated filler data via GitHub Action" || echo "No new data to commit"
          git push
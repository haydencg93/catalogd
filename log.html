<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Catalogd | Log Entry</title>
    <link rel="stylesheet" href="stylingIndex.css">
    <link rel="stylesheet" href="stylingLog.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="icon" type="image/x-icon" href="catalogdFavicon.png" />
</head>
<body>
    <header>
        <div class="css-logo" onclick="window.location.href='index.html'">
            <div class="logo-circles">
                <div class="circle c-movie"></div>
                <div class="circle c-tv"></div>
                <div class="circle c-book"></div>
            </div>
            <div class="logo-text">catalog<span>d</span></div>
        </div>
        <nav class="nav-actions">
            <button id="back-to-details-btn" class="secondary-btn">← Cancel & Go Back</button>
        </nav>
    </header>

    <main class="log-container">
        <div class="log-card">
            <h1 id="media-title">Loading...</h1>
            
            <div class="input-group">
                <label>What are you logging?</label>
                <select id="log-scope">
                    <option value="entire">Entire Series / Movie / Book</option>
                    <option value="season">Specific Season</option>
                    <option value="episode">Specific Episode</option>
                </select>
            </div>

            <div id="book-input-group" class="input-group" style="display:none;">
                <label>Current Progress</label>
                <div style="display: flex; gap: 10px;">
                    <input type="number" id="book-chapter" placeholder="Chapter #" style="flex: 1;">
                    <input type="number" id="book-page" placeholder="Page #" style="flex: 1;">
                </div>
            </div>

            <div id="youtube-input-group" class="input-group" style="display:none;">
                <label>Video Duration (Minutes)</label>
                <input type="number" id="youtube-duration" placeholder="e.g., 15" style="width: 100%; background: #14181c; color: white; border: 1px solid #2c3440; padding: 12px; border-radius: 8px; box-sizing: border-box;">
            </div>

            <div id="track-input-group" class="input-group" style="display:none;">
                <label>Select Track</label>
                <select id="track-select" style="width: 100%; background: #14181c; color: white; border: 1px solid #2c3440; padding: 12px; border-radius: 8px; box-sizing: border-box;"></select>
            </div>

            <div id="dropdown-group" class="tracker-controls" style="display:none;">
                <select id="season-select"></select>
                <select id="episode-select" style="display:none;"></select>
            </div>

            <div class="media-actions">
                <button id="like-btn" class="action-btn-icon">
                    <span class="heart-icon">❤</span> Like
                </button>
                <div class="status-toggles">
                    <button id="rewatch-btn" class="secondary-btn">Mark as Rewatch</button>
                </div>
            </div>

            <div class="rating-section">
                <div id="star-rater" class="star-input">
                    <span class="star" data-value="1">★</span>
                    <span class="star" data-value="2">★</span>
                    <span class="star" data-value="3">★</span>
                    <span class="star" data-value="4">★</span>
                    <span class="star" data-value="5">★</span>
                </div>
                <div id="rating-display" style="color: #9ab; text-align: center; margin-bottom: 10px;">0.0 Stars</div>

                <input type="date" id="watched-date">
                <div id="tags-display-container" class="tags-pill-container"></div>
                <input type="text" id="log-tags-input" placeholder="Add a tag and press Enter...">
                <textarea id="user-notes" placeholder="Write your thoughts..."></textarea>
                <button id="save-log-btn" class="primary-btn">Save to Diary</button>
            </div>
        </div>
    </main>
    <script src="scriptingLog.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Catalogd | Details</title>
    <link rel="stylesheet" href="stylingIndex.css">
    <link rel="stylesheet" href="stylingDetails.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="backdrop-overlay"></div>
    <header>
        <div class="logo" onclick="window.location.href='index.html'">catalo<span>gd</span></div>
    </header>
    <main class="details-container">
        <div id="poster-area"></div>
        <div class="info-pane">
            <h1 id="media-title"></h1>
            <div id="watch-providers" class="providers-section">
                <h4>Where to Watch</h4>
                <div id="providers-list" class="provider-icons">
                    </div>
            </div>
            <div id="media-meta" class="meta"></div>
            <p id="media-overview"></p>
            <div id="tv-tracker" class="rating-section" style="display: none;">
                <h3>Episode Tracker</h3>
                <div class="tracker-controls">
                    <select id="season-selector"></select>
                    <button id="mark-season-btn" class="secondary-btn">Mark Season as Watched</button>
                    <button id="clear-season-btn" class="danger-btn">Clear Season</button> 
                </div>
                <div id="episode-list" class="episode-grid">
                    </div>
            </div>
            <div class="rating-section">
                <h3>Log & Rate</h3>
                <div id="star-rater" class="star-input">
                    <span class="star" data-value="1">★</span>
                    <span class="star" data-value="2">★</span>
                    <span class="star" data-value="3">★</span>
                    <span class="star" data-value="4">★</span>
                    <span class="star" data-value="5">★</span>
                </div>
                <p id="rating-message">Tap a star to rate</p>
                <div class="log-entry">
                    <div class="log-header">
                        <h3>Your Thoughts</h3>
                        <div class="date-input-group">
                            <label for="watched-date">Date:</label>
                            <input type="date" id="watched-date">
                        </div>
                    </div>
                    <textarea id="user-notes" placeholder="Write a review or some notes..."></textarea>
                    <div class="log-actions">
                        <button id="save-log-btn" class="primary-btn">Save Log</button>
                        <button id="delete-log-btn" class="danger-btn">Clear Entry</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="scriptingDetails.js"></script>
</body>
</html>

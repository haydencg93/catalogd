<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogd | Movies, TV & Books</title>
    <!-- Link to your renamed CSS file -->
    <link rel="stylesheet" href="stylingIndex.css">
</head>
<body>

    <header>
        <div class="logo">catalo<span>gd</span></div>
        <div class="nav-actions">
            <button id="login-btn" class="secondary-btn">Sign In</button>
        </div>
    </header>

    <main>
        <!-- Search Section -->
        <section class="search-section">
            <!-- This input is disabled by default until scriptingIndex.js loads the config -->
            <input type="text" id="search-input" placeholder="Preparing library..." disabled>
            <div id="loader">Loading configuration...</div>
        </section>

        <!-- The container for your unified results -->
        <div class="grid" id="results-grid">
            <!-- JavaScript in scriptingIndex.js will inject cards here -->
        </div>
    </main>

    <!-- Connect to your external logic file -->
    <script src="scriptingIndex.js"></script>
</body>
</html>

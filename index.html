<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogd</title>
    <link rel="icon" type="image/x-icon" href="catalogdFavicon.png" />
    <link rel="stylesheet" href="stylingIndex.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="css-logo" onclick="window.location.href='index.html'">
            <div class="logo-text">catalog<span>d</span></div>
            <div class="logo-circles">
                <div class="circle c-movie"></div>
                <div class="circle c-tv"></div>
                <div class="circle c-book"></div>
                <div class="circle c-album"></div>
                <div class="circle c-youtube"></div>
            </div>
        </div>
        <div class="nav-actions">
            <!-- Login remains -->
            <button id="login-btn" class="secondary-btn">Sign In</button>
            
            <div id="profile-menu" class="profile-dropdown" style="display:none;">
                <button class="profile-trigger" onclick="toggleProfileDropdown()">
                    <img src="https://ui-avatars.com/api/?name=User&background=0d0776&color=fff" id="nav-avatar" alt="Profile">
                    <span class="dropdown-arrow"></span>
                </button>
                <div id="dropdown-content" class="dropdown-content">
                    <a href="index.html">Home</a>
                    <a href="diary.html">Diary</a>
                    <a href="lists.html">Lists</a>
                    <a href="watchlist.html">Watchlist</a>
                    <a href="stats.html">Stats</a>
                    <a href="profile.html">Profile</a>
                    <a href="settings.html">Settings</a>
                    <hr>
                    <a href="#" onclick="signOut()">Sign Out</a>
                </div>
            </div>
        </div>
    </header>

    <main>
        <section class="search-section">
            <div class="search-bar-wrapper">
                <select id="search-filter">
                    <option value="all">All</option>
                    <option value="movie">Movies</option>
                    <option value="tv">TV Shows</option>
                    <option value="book">Books</option>
                    <option value="album">Music</option>
                    <option value="user">Users</option>
                    <option value="person">Cast Members</option>
                    <option value="author">Authors</option>
                </select>
                <input type="text" id="search-input" placeholder="Preparing library..." disabled>
            </div>

            <div style="margin-top: 25px; margin-bottom: 40px; display: flex; flex-direction: column; align-items: center; gap: 20px;">
                <button id="adv-search-btn" class="secondary-btn" style="width: 350px; max-width: 100%; padding: 15px 20px; font-size: 1.1rem; box-sizing: border-box;" onclick="window.location.href='advSearch.html'">
                    Advanced Search
                </button>
                <div style="display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; width: 100%; max-width: 750px;">
                    <button id="recs-btn" class="primary-btn" style="flex: 1; min-width: 280px; padding: 15px 20px; font-size: 1.1rem; box-shadow: 0 4px 15px rgba(0, 224, 84, 0.2); box-sizing: border-box;" onclick="window.location.href='recs.html'">
                        Discover with AI Recommendations
                    </button>
                    <button id="picker-btn" class="primary-btn" style="flex: 1; min-width: 280px; padding: 15px 20px; font-size: 1.1rem; box-shadow: 0 4px 15px var(--accent-glow); box-sizing: border-box; background: linear-gradient(135deg, var(--accent), #4338ca);" onclick="window.location.href='picker.html'">
                        Random Decider
                    </button>
                </div>
            </div>

            <div id="loader">Loading configuration...</div>
        </section>
        <div class="filter-nav">
            <button id="btn-movie" class="filter-btn active" onclick="switchTab('movie')">Movies</button>
            <button id="btn-tv" class="filter-btn" onclick="switchTab('tv')">TV Shows</button>
            <button id="btn-book" class="filter-btn" onclick="switchTab('book')">Books</button>
            <button id="btn-album" class="filter-btn" onclick="switchTab('album')">Music</button>
            <button id="btn-youtube" class="filter-btn" onclick="switchTab('youtube')">YouTube</button>
        </div>

        <h2 id="section-title" class="section-title" style="display: none;"></h2>
        <div class="grid" id="results-grid"></div>
    </main>

    <div id="auth-modal" class="modal-overlay" style="display:none;">
        <div class="auth-card">
            <h2 id="modal-title">Welcome Back</h2>
            
            <div id="signup-fields" style="display: none;">
                <input type="text" id="auth-name" placeholder="Full Name (e.g. John Doe)">
                <input type="text" id="auth-username" placeholder="Username">
            </div>

            <input type="email" id="auth-email" placeholder="Email">
            <input type="password" id="auth-password" placeholder="Password">

            <input type="password" id="auth-retype" placeholder="Confirm Password" style="display: none;">

            <p id="forgot-password-link" onclick="handleForgotPassword()" style="color: #9ab; cursor: pointer; font-size: 0.8rem; margin-bottom: 15px; text-decoration: underline;">Forgot password?</p>

            <button id="auth-confirm-btn" class="primary-btn">Sign In</button>
            <p onclick="toggleAuthMode()" id="auth-switch">Need an account? Sign Up</p>
            <button id="close-auth" class="close-btn">×</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="scriptingIndex.js"></script>
</body>
</html>

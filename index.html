<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogd | Movies, TV & Books</title>
    <link rel="icon" type="image/x-icon" href="catalogdFavicon.png" />
    <link rel="stylesheet" href="stylingIndex.css">
</head>
<body>
    <header>
        <div class="logo"><img src="catalogdLogo.png" alt="Catalogd" width="300" height="82"></div>
        <div class="nav-actions">
            <button id="profile-btn" class="secondary-btn" style="display:none;" onclick="window.location.href='profile.html'">My Profile</button>
            <button id="login-btn" class="secondary-btn">Sign In</button>
        </div>
    </header>

    <main>
        <section class="search-section">
            <input type="text" id="search-input" placeholder="Preparing library..." disabled>
            <div id="loader">Loading configuration...</div>
        </section>
        <div class="filter-nav">
            <button id="btn-movie" class="filter-btn active" onclick="switchTab('movie')">Movies</button>
            <button id="btn-tv" class="filter-btn" onclick="switchTab('tv')">TV Shows</button>
            <button id="btn-book" class="filter-btn" onclick="switchTab('book')">Books</button>
        </div>

        <div class="grid" id="results-grid"></div>
    </main>

    <div id="auth-modal" class="modal-overlay" style="display:none;">
        <div class="auth-card">
            <h2 id="modal-title">Welcome Back</h2>
            
            <div id="signup-fields" style="display: none;">
                <input type="text" id="auth-name" placeholder="Full Name (e.g. John Doe)">
                <input type="text" id="auth-username" placeholder="Username">
            </div>

            <input type="email" id="auth-email" placeholder="Email">
            <input type="password" id="auth-password" placeholder="Password">

            <input type="password" id="auth-retype" placeholder="Confirm Password" style="display: none;">

            <p id="forgot-password-link" onclick="handleForgotPassword()" style="color: #9ab; cursor: pointer; font-size: 0.8rem; margin-bottom: 15px; text-decoration: underline;">Forgot password?</p>

            <button id="auth-confirm-btn" class="primary-btn">Sign In</button>
            <p onclick="toggleAuthMode()" id="auth-switch">Need an account? Sign Up</p>
            <button id="close-auth" class="close-btn">×</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="scriptingIndex.js"></script>
</body>
</html>

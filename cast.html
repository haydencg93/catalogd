<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogd | Cast & Characters</title>
    <link rel="stylesheet" href="stylingIndex.css">
    <link rel="stylesheet" href="stylingDetails.css">
    <link rel="stylesheet" href="stylingCast.css">
    <link rel="icon" type="image/x-icon" href="catalogdFavicon.png" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="css-logo" onclick="window.location.href='index.html'">
            <div class="logo-text">catalog<span>d</span></div>
            <div class="logo-circles">
                <div class="circle c-movie"></div>
                <div class="circle c-tv"></div>
                <div class="circle c-book"></div>
                <div class="circle c-album"></div>
                <div class="circle c-youtube"></div>
            </div>
        </div>
        
        <section class="search-section header-search">
            <div class="search-bar-wrapper">
                <select id="search-filter">
                    <option value="all">All</option>
                    <option value="movie">Movies</option>
                    <option value="tv">TV Shows</option>
                    <option value="book">Books</option>
                    <option value="album">Music</option>
                    <option value="user">Users</option>
                    <option value="person">Cast Members</option>
                    <option value="author">Authors</option>
                </select>
                <input type="text" id="search-input" placeholder="Search for movies, shows, books, cast members, ...">
            </div>
        </section>

        <div class="nav-actions">
            <button id="login-btn" class="secondary-btn">Sign In</button>
            <div id="profile-menu" class="profile-dropdown" style="display:none;">
                <button class="profile-trigger" onclick="toggleProfileDropdown(event)">
                    <img src="https://ui-avatars.com/api/?name=User&background=0d0776&color=fff" id="nav-avatar" alt="Profile">
                    <span class="dropdown-arrow"></span>
                </button>
                <div id="dropdown-content" class="dropdown-content">
                    <a href="index.html">Home</a>
                    <a href="diary.html">Diary</a>
                    <a href="lists.html">Lists</a>
                    <a href="watchlist.html">Watchlist</a>
                    <a href="stats.html">Stats</a>
                    <a href="profile.html">Profile</a>
                    <a href="settings.html">Settings</a>
                    <hr>
                    <a href="#" onclick="signOut()">Sign Out</a>
                </div>
            </div>
        </div>
    </header>

    <main class="cast-container">
        <section id="person-header">
            <div id="person-left-col" style="display: flex; flex-direction: column; gap: 10px; width: 280px; flex-shrink: 0;">
                <div id="person-image-container"></div>
                <button id="follow-person-btn" class="primary-btn" style="width: 100%; display: none;">Follow</button>
                <button id="edit-art-btn" class="secondary-btn" style="display:none; width: 100%;">Edit Art</button>
            </div>
            
            <div id="person-bio-area">
                <h1 id="person-name">Loading...</h1>
                <p id="person-biography" class="meta"></p>
            </div>
        </section>

        <section id="filmography">
            <h3>Filmography</h3>
            <div id="film-list"></div>
        </section>
    </main>

    <div id="custom-art-modal" class="modal-overlay" style="display:none;">
        <div class="auth-card">
            <button class="close-btn" id="close-art-modal">×</button>
            <h3 style="margin-top: 0;">Custom Art</h3>
            <p class="meta" style="margin-bottom: 15px; font-size: 0.85rem;">Paste an image URL to override the default art. Leave blank to use defaults.</p>
            <input type="text" id="custom-poster-input" placeholder="Custom Image URL" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #2c3440; background: rgba(255, 255, 255, 0.05); color: white; box-sizing: border-box;">
            <button id="save-art-btn" class="primary-btn" style="margin-top: 15px; width: 100%;">Save Art</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="scriptingCast.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogd | Cast</title>
    <link rel="stylesheet" href="stylingIndex.css">
    <link rel="stylesheet" href="stylingDetails.css">
    <link rel="stylesheet" href="stylingCast.css">
    <link rel="icon" type="image/x-icon" href="catalogdFavicon.png" />
</head>
<body>
    <header>
        <div class="css-logo" onclick="window.location.href='index.html'">
            <div class="logo-text">catalog<span>d</span></div>
            <div class="logo-circles">
                <div class="circle c-movie"></div>
                <div class="circle c-tv"></div>
                <div class="circle c-book"></div>
                <div class="circle c-album"></div>
                <div class="circle c-youtube"></div>
            </div>
        </div>
        
        <section class="search-section" style="flex-grow: 1; margin: 0 40px;">
            <input type="text" id="search-input" placeholder="Search for movies, shows, books, cast members, ..." style="margin: 0; max-width: 400px;">
        </section>

        <div class="nav-actions">
            <button id="login-btn" class="secondary-btn">Sign In</button>
            <div id="profile-menu" class="profile-dropdown" style="display:none;">
                <button class="profile-trigger" onclick="toggleProfileDropdown(event)">
                    <img src="https://ui-avatars.com/api/?name=User&background=0d0776&color=fff" id="nav-avatar" alt="Profile">
                    <span class="dropdown-arrow"></span>
                </button>
                <div id="dropdown-content" class="dropdown-content">
                    <a href="diary.html">Diary</a>
                    <a href="lists.html">Lists</a>
                    <a href="watchlist.html">Watchlist</a>
                    <a href="profile.html">My Profile</a>
                    <a href="settings.html">Settings</a>
                    <hr>
                    <a href="#" onclick="signOut()">Sign Out</a>
                </div>
            </div>
        </div>
    </header>

    <main class="cast-container">
        <section id="person-header">
            <div id="person-image-container"></div>
            <div id="person-bio-area">
                <h1 id="person-name">Loading...</h1>
                <p id="person-biography" class="meta"></p>
            </div>
        </section>

        <section id="filmography">
            <h3>Filmography</h3>
            <div id="film-list"></div>
        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="scriptingCast.js"></script>
</body>
</html>

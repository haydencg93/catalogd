<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Catalogd | My Profile</title>
    <link rel="stylesheet" href="stylingIndex.css">
    <style>
        .profile-container { max-width: 900px; margin: 60px auto; padding: 0 20px; }
        .profile-header { display: flex; align-items: center; gap: 30px; margin-bottom: 50px; }
        .avatar-placeholder { width: 100px; height: 100px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: #000; font-weight: bold; }
        .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 50px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #2c3440; }
        .stat-value { display: block; font-size: 2rem; font-weight: bold; color: var(--accent); }
        .stat-label { color: #9ab; font-size: 0.9rem; text-transform: uppercase; }
    </style>
</head>
<body>
    <header>
        <div class="logo" onclick="window.location.href='index.html'">catalo<span>gd</span></div>
        <button onclick="window.location.href='index.html'" class="secondary-btn">Back to Search</button>
    </header>

    <main class="profile-container">
        <div class="profile-header">
            <div id="user-avatar" class="avatar-placeholder">?</div>
            <div>
                <h1 id="user-email" style="margin:0;">Loading...</h1>
                <p class="meta">Member since <span id="member-since">...</span></p>
            </div>
        </div>

        <div class="stats-bar">
            <div class="stat-card"><span id="stat-count" class="stat-value">0</span><span class="stat-label">Total Logs</span></div>
            <div class="stat-card"><span id="stat-avg" class="stat-value">0</span><span class="stat-label">Avg Rating</span></div>
            <div class="stat-card"><span id="stat-books" class="stat-value">0</span><span class="stat-label">Books Read</span></div>
        </div>

        <h2>Recent Activity</h2>
        <div class="grid" id="recent-grid">
            </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="scriptingProfile.js"></script>
</body>
</html>

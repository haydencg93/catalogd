<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Catalogd | My Profile</title>
    <link rel="stylesheet" href="stylingProfile.css">
    <link rel="icon" type="image/x-icon" href="catalogdFavicon.png" />
</head>
<body>
<header>
    <div class="logo" onclick="window.location.href='index.html'">
        <img src="catalogdLogo.png" alt="Catalogd" width="300" height="82">
    </div>
    <div class="nav-actions">
        <button onclick="window.location.href='diary.html'" class="secondary-btn">Diary</button>
        <button onclick="window.location.href='lists.html'" class="secondary-btn">Lists</button>
        <button onclick="window.location.href='index.html'" class="secondary-btn">Home</button>
    </div>
</header>
    <main class="profile-container">
        <div id="profile-banner" class="profile-banner"></div>
        <div class="profile-header">
            <div id="user-avatar" class="avatar-placeholder">?</div>
            <div>
                <h1 id="user-display-name" style="margin:0;">Loading...</h1>
                <div id="user-username" style="color: #9ab; font-size: 1.1rem; margin-top: 4px;">@username</div>
                <p class="meta" style="margin-top: 10px;">Member since <span id="member-since">...</span></p>
            </div>
        </div>

        <div class="user-bio-container" style="margin-bottom: 30px;">
            <p id="display-bio" style="font-size: 1.1rem; line-height: 1.6; color: #ccd6e0; margin-bottom: 10px;"></p>
            <a id="display-website" href="#" target="_blank" style="color: var(--accent); text-decoration: none; font-size: 0.9rem;"></a>
        </div>
        <div class="profile-tabs">
            <button class="tab-btn active" onclick="switchTab('home')">Home</button>
            <button class="tab-btn" onclick="switchTab('library')">Library</button>
            <button class="tab-btn" onclick="switchTab('on-hold')">On Hold / Dropped</button>
        </div>

        <div id="tab-library" class="tab-content">
            <div class="section-header">
                <h2>Library</h2>
            </div>
            <div class="grid" id="library-grid">
                <p class="meta">Full library view coming soon...</p>
            </div>
        </div>

        <div id="tab-on-hold" class="tab-content">
            <div class="section-header">
                <h2>Paused & Dropped</h2>
            </div>
            <div class="grid" id="on-hold-grid"></div>
        </div>

        <div id="tab-home" class="tab-content active">
            <div class="stats-bar">
                <div class="stat-card">
                    <span id="stat-count" class="stat-value">0</span>
                    <span class="stat-label">Total Logs</span>
                </div>
                <div class="stat-card" id="following-stat-btn" style="cursor: pointer;">
                    <span id="following-count" class="stat-value">0</span>
                    <span class="stat-label">Following</span>
                </div>
                <div class="stat-card" id="followers-stat-btn" style="cursor: pointer;">
                    <span id="followers-count" class="stat-value">0</span>
                    <span class="stat-label">Followers</span>
                </div>
                <div class="stat-card" onclick="window.location.href='watchlist.html' + (profileUserId ? '?id=' + profileUserId : '')" style="cursor: pointer; border-color: var(--accent);">
                    <span id="watchlist-count" class="stat-value">0</span>
                    <span class="stat-label">Watchlist →</span>
                </div>
            </div>

            <section id="favorites-section" style="margin-bottom: 50px;">
                <div class="section-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2 style="margin: 0;">Favorites</h2>
                    <div class="filter-nav" style="margin: 0;">
                        <button class="filter-btn active" onclick="filterFavs('all')">All</button>
                        <button class="filter-btn" onclick="filterFavs('movie')">Movies</button>
                        <button class="filter-btn" onclick="filterFavs('tv')">TV</button>
                        <button class="filter-btn" onclick="filterFavs('book')">Books</button>
                    </div>
                </div>
                <div class="grid" id="favorites-grid"></div>
            </section>

            <section id="active-tracking-section" style="margin-bottom: 50px; display: none;">
                <div class="section-header">
                    <h2 style="margin: 0;">Currently Watching/Reading</h2>
                </div>
                <div class="grid" id="active-grid"></div>
            </section>

            <div class="section-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin: 0;">Recent Activity</h2>
                <div class="filter-nav" style="margin: 0;">
                    <button class="filter-btn active" onclick="filterRecent('all')">All</button>
                    <button class="filter-btn" onclick="filterRecent('movie')">Movies</button>
                    <button class="filter-btn" onclick="filterRecent('tv')">TV</button>
                    <button class="filter-btn" onclick="filterRecent('book')">Books</button>
                </div>
            </div>
            <div class="grid" id="recent-grid"></div>
        </div>

        <div id="social-modal" class="modal">
            <div class="modal-content social-modal-content">
                <div class="modal-header">
                    <h2 id="social-modal-title">Users</h2>
                    <span class="close-modal" id="close-social-modal">&times;</span>
                </div>
                <div id="social-modal-body" class="social-list-container">
                    </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="scriptingProfile.js"></script>

    <div class="settings-section" style="margin-top: 50px; border-top: 1px solid #2c3440; padding-top: 20px;">
        <button onclick="window.location.href='settings.html'" class="secondary-btn">Account Settings</button>
    </div>
</body>
</html>

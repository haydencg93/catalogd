<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Catalogd | My Profile</title>
    <link rel="stylesheet" href="stylingProfile.css">
    <link rel="icon" type="image/x-icon" href="catalogdFavicon.png" />
    <style>
        .profile-container { max-width: 900px; margin: 60px auto; padding: 0 20px; }
        .profile-header { display: flex; align-items: center; gap: 30px; margin-bottom: 50px; }
        .avatar-placeholder { width: 100px; height: 100px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: #000; font-weight: bold; }
        .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 50px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #2c3440; }
        .stat-value { display: block; font-size: 2rem; font-weight: bold; color: var(--accent); }
        .stat-label { color: #9ab; font-size: 0.9rem; text-transform: uppercase; }
    </style>
</head>
<body>
<header>
    <div class="logo" onclick="window.location.href='index.html'">
        <img src="catalogdLogo.png" alt="Catalogd" width="300" height="82">
    </div>
    <div class="nav-actions">
        <button onclick="window.location.href='diary.html'" class="secondary-btn">Diary</button>
        <button onclick="window.location.href='lists.html'" class="secondary-btn">Lists</button>
        <button onclick="window.location.href='index.html'" class="secondary-btn">Home</button>
    </div>
</header>
    <main class="profile-container">
        <div id="profile-banner" class="profile-banner"></div>
        <div class="profile-header">
            <div id="user-avatar" class="avatar-placeholder">?</div>
            <div>
                <h1 id="user-display-name" style="margin:0;">Loading...</h1>
                <div id="user-username" style="color: #9ab; font-size: 1.1rem; margin-top: 4px;">@username</div>
                <p class="meta" style="margin-top: 10px;">Member since <span id="member-since">...</span></p>
            </div>
        </div>

        <div class="stats-bar">
            <div class="stat-card" style="grid-column: span 2;">
                <span id="stat-count" class="stat-value">0</span>
                <span class="stat-label">Total Logs</span>
            </div>
            <div class="stat-card" onclick="window.location.href='watchlist.html'" style="cursor: pointer; border-color: var(--accent);">
                <span id="watchlist-count" class="stat-value">0</span>
                <span class="stat-label">Watchlist →</span>
            </div>
        </div>

        <div class="section-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin: 0;">Recent Activity</h2>
            <div class="filter-nav" style="margin: 0;">
                <button class="filter-btn active" onclick="filterRecent('all')">All</button>
                <button class="filter-btn" onclick="filterRecent('movie')">Movies</button>
                <button class="filter-btn" onclick="filterRecent('tv')">TV</button>
                <button class="filter-btn" onclick="filterRecent('book')">Books</button>
            </div>
        </div>
        <div class="grid" id="recent-grid"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="scriptingProfile.js"></script>

    <div class="settings-section" style="margin-top: 50px; border-top: 1px solid #2c3440; padding-top: 20px;">
        <button onclick="window.location.href='settings.html'" class="secondary-btn">Account Settings</button>
    </div>
</body>
</html>

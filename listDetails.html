<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Catalogd | List Details</title>
    <link rel="stylesheet" href="stylingIndex.css">
    <link rel="stylesheet" href="stylingProfile.css">
    <link rel="stylesheet" href="stylingDetails.css">
    <link rel="stylesheet" href="stylingListDetails.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>
<body>
    <header>
        <div class="logo" onclick="window.location.href='index.html'">
            <img src="catalogdLogo.png" alt="Catalogd" width="300" height="82">
        </div>
        <div class="nav-actions">
            <button id="back-to-lists-btn" class="secondary-btn">Back to Lists</button>
            <button onclick="window.location.href='index.html'" class="secondary-btn">Home</button>
        </div>
    </header>

    <main class="profile-container">
        <div class="list-header-info">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h1 id="list-name">Loading List...</h1>
                    <p id="list-desc" class="meta">Manage your collection below.</p>
                </div>

                <button id="open-collab-modal-btn" class="secondary-btn" style="display:none;">Collaborators</button>
                <div id="collab-modal" class="modal">
                    <div class="modal-content social-modal-content">
                        <div class="modal-header">
                            <h2>Collaborators</h2>
                            <button class="close-btn" id="close-collab-modal">×</button>
                        </div>
                        
                        <div class="search-container" style="background: rgba(255,255,255,0.03); margin-bottom: 20px;">
                            <p class="meta" style="margin-top:0;">Invite by username</p>
                            <div class="input-group" style="display: flex; gap: 10px;">
                                <input type="text" id="collab-username" placeholder="Username..." style="margin:0; flex-grow:1;">
                                <button id="add-collab-btn" class="primary-btn" style="width: auto; padding: 0 15px;">Invite</button>
                            </div>
                        </div>

                        <div id="collab-list" class="social-list-container">
                            <p class="meta">Loading editors...</p>
                        </div>
                    </div>
                </div>
                
                <div class="list-controls">
                    <button id="edit-list-btn" class="secondary-btn" style="display:none;">Edit List</button>
                    
                    <button id="manage-order-btn" class="secondary-btn" style="display:none;">Reorder Items</button>
                    <button id="save-order-btn" class="primary-btn" style="display:none;">Save Order</button>
                </div>
            </div>
        </div>

        <div id="edit-list-modal" class="modal">
            <div class="modal-content social-modal-content" style="max-width: 450px;">
                <div class="modal-header">
                    <h2>Edit List</h2>
                    <button class="close-btn" id="close-edit-list-modal">×</button>
                </div>
                
                <div class="input-group">
                    <label style="color:#9ab; font-size:0.9rem; display:block; margin-bottom:5px;">List Name</label>
                    <input type="text" id="edit-list-name" style="width: 100%; box-sizing: border-box;">
                </div>
                
                <div class="input-group" style="margin-top: 15px;">
                    <label style="color:#9ab; font-size:0.9rem; display:block; margin-bottom:5px;">Description</label>
                    <textarea id="edit-list-desc" placeholder="What is this list about?" style="width: 100%; box-sizing: border-box; background: #14181c; border: 1px solid #2c3440; border-radius: 8px; color: white; padding: 12px; font-family: inherit; resize: vertical; min-height: 80px;"></textarea>
                </div>
                
                <div class="input-group" style="margin-top: 15px;">
                    <label style="color:#9ab; font-size:0.9rem; display:block; margin-bottom:5px;">Privacy</label>
                    <select id="edit-visibility-select" style="width: 100%; background: #14181c; border: 1px solid #2c3440; border-radius: 8px; color: white; padding: 12px;">
                        <option value="true">Public</option>
                        <option value="false">Private</option>
                    </select>
                </div>
                
                <div class="input-group" style="display: flex; align-items: center; gap: 10px; margin-top: 20px; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 8px;">
                    <input type="checkbox" id="edit-ranked-toggle" style="width: 18px; height: 18px; accent-color: var(--accent); margin: 0; cursor: pointer;">
                    <div>
                        <label for="edit-ranked-toggle" style="margin: 0; cursor: pointer; font-weight: bold; color: white;">Ranked List</label>
                        <div style="font-size: 0.8rem; color: #9ab; margin-top: 3px;">Display numbers on posters and allow manual sorting.</div>
                    </div>
                </div>
                
                <button id="save-list-edits-btn" class="primary-btn" style="margin-top: 25px;">Save Changes</button>
            </div>
        </div>

        <section class="search-container">
            <h3>Add to List</h3>
            <input type="text" id="list-search-input" placeholder="Search for something to add...">
            <div id="search-results" class="search-results-dropdown"></div>
        </section>

        <h2>Items in this List</h2>
        <div id="list-content" class="list-items-grid">
            <p class="meta">No items in this list yet.</p>
        </div>
    </main>

    <script src="scriptingListDetails.js"></script>
</body>
</html>

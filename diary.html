<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogd | Diary</title>
    <link rel="stylesheet" href="stylingIndex.css">
    <link rel="stylesheet" href="stylingDiary.css">
    <link rel="icon" type="image/x-icon" href="catalogdFavicon.png" />
</head>
<body>
    <header>
        <div class="logo" onclick="window.location.href='index.html'">
            <img src="catalogdLogo.png" alt="Catalogd" width="300" height="82">
        </div>
        <nav class="nav-actions">
            <button onclick="window.location.href='profile.html'" class="secondary-btn">Profile</button>
            <button onclick="window.location.href='index.html'" class="secondary-btn">Home</button>
        </nav>
    </header>

<main class="diary-container">
        <div class="diary-header">
            <h1>Diary</h1>
            <div class="diary-controls">
                <select id="rating-filter" onchange="applyFilters()">
                    <option value="all">All Ratings</option>
                    <option value="5">★★★★★</option>
                    <option value="4">★★★★</option>
                    <option value="3">★★★</option>
                    <option value="2">★★</option>
                    <option value="1">★</option>
                </select>
                <input type="text" id="diary-search" placeholder="Search titles..." oninput="applyFilters()">
            </div>
        </div>
        
        <div class="diary-stats">
            <div class="stat-item"><span id="total-logs">0</span> Logs</div>
            <div class="stat-item"><span id="avg-rating">0.0</span> Avg Rating</div> <div class="stat-item"><span id="total-movies">0</span> Movies</div>
            <div class="stat-item"><span id="total-books">0</span> Books</div>
            <div class="stat-item"><span id="total-series">0</span> Series</div>
            <div class="stat-item"><span id="total-seasons">0</span> Seasons</div>
            <div class="stat-item"><span id="total-episodes">0</span> Episodes</div>
            <div class="stat-item"><span id="total-time">0</span> Minutes</div>
        </div>

        <div class="filter-nav">
            <button id="btn-all" class="filter-btn active" onclick="filterType('all')">All</button>
            <button id="btn-movie" class="filter-btn" onclick="filterType('movie')">Movies</button>
            <button id="btn-tv" class="filter-btn" onclick="filterType('tv')">TV</button>
            <button id="btn-book" class="filter-btn" onclick="filterType('book')">Books</button>
        </div>

        <div class="table-wrapper">
            <table id="diary-table">
                <thead>
                    <tr>
                        <th onclick="toggleSort('date')" class="sortable">Date <span id="date-sort-icon">↓</span></th>
                        <th>Cover</th>
                        <th>Name</th>
                        <th>Released</th>
                        <th>Rating</th>
                        <th>Review</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="diary-body">
                    </tbody>
            </table>
            <div id="load-more-container">
                <button id="load-more-btn" class="secondary-btn">Load More Entries</button>
            </div>
        </div>
    </main>

    <div id="review-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2 id="modal-title">Review</h2>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="scriptingDiary.js"></script>
</body>
</html>

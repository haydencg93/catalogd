<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogd | Fandom</title>
    <link rel="stylesheet" href="stylingIndex.css">
    <link rel="stylesheet" href="stylingDetails.css">
    <link rel="stylesheet" href="stylingFandom.css">
    <link rel="icon" type="image/x-icon" href="catalogdFavicon.png" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="css-logo" onclick="window.location.href='index.html'">
            <div class="logo-text">catalog<span>d</span></div>
            <div class="logo-circles">
                <div class="circle c-movie"></div>
                <div class="circle c-tv"></div>
                <div class="circle c-book"></div>
                <div class="circle c-album"></div>
                <div class="circle c-youtube"></div>
            </div>
        </div>
        <div class="nav-actions">
            <button id="login-btn" class="secondary-btn">Sign In</button>
            <div id="profile-menu" class="profile-dropdown" style="display:none;">
                <button class="profile-trigger" onclick="toggleProfileDropdown(event)">
                    <img src="https://ui-avatars.com/api/?name=User&background=0d0776&color=fff" id="nav-avatar" alt="Profile">
                    <span class="dropdown-arrow"></span>
                </button>
                <div id="dropdown-content" class="dropdown-content">
                    <a href="index.html">Home</a>
                    <a href="diary.html">Diary</a>
                    <a href="lists.html">Lists</a>
                    <a href="watchlist.html">Watchlist</a>
                    <a href="stats.html">Stats</a>
                    <a href="profile.html">Profile</a>
                    <a href="settings.html">Settings</a>
                    <hr>
                    <a href="#" onclick="signOut()">Sign Out</a>
                </div>
            </div>
        </div>
    </header>

    <main class="details-container">
        <div id="left-col">
            <div id="fandom-poster-area">
                <img id="fandom-image" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='500' height='750'><rect width='500' height='750' fill='%2314181c'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' font-family='sans-serif' font-size='24' fill='%239ab'>Loading...</text></svg>" alt="Fandom Art">
            </div>
            <button id="follow-fandom-btn" class="primary-btn" style="width: 100%; margin-top: 15px;">Follow Fandom</button>
        </div>
        
        <div class="info-pane">
            <h1 id="fandom-title">Loading Wikipedia Lore...</h1>
            <div id="fandom-meta" class="meta">Universal Translator Active</div>
            
            <div class="rating-section">
                <h3>Wikipedia Summary</h3>
                <p id="fandom-overview" style="line-height: 1.6;"></p>
                <a id="wiki-link" href="#" target="_blank" style="color: var(--accent); display: none; margin-top: 10px;">Read full article on Wikipedia →</a>
            </div>

            <div id="fandom-plot-section" class="rating-section" style="display: none; margin-top: 20px;">
                <h3>Plot</h3>
                <div id="fandom-plot-content" class="wiki-content"></div>
            </div>

            <div id="fandom-cast-section" class="rating-section" style="display: none; margin-top: 20px;">
                <h3>Cast & Characters</h3>
                <!-- <p class="meta" style="margin-bottom: 15px;">Click a character to view their profile.</p> -->
                <div id="fandom-cast-content" class="wiki-content"></div>
            </div>
        </div>
    </main>

    <div id="character-modal" class="modal-overlay">
        <div class="auth-card cast-modal-card">
            <button class="close-btn" id="close-character-modal">×</button>
            <h2 style="margin-top: 0;">All Characters</h2>
            <input type="text" id="character-search-input" placeholder="Search by character name...">
            <div id="full-character-grid" class="fandom-character-grid modal-cast-grid">
            </div>
        </div>
    </div>

    <script src="scriptingFandom.js"></script>
</body>
</html>

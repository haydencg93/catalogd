<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogd | Watchlist</title>
    <link rel="stylesheet" href="stylingIndex.css">
    <link rel="stylesheet" href="stylingWatchlist.css">
    <link rel="icon" type="image/x-icon" href="catalogdFavicon.png" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="css-logo" onclick="window.location.href='index.html'">
            <div class="logo-text">catalog<span>d</span></div>
            <div class="logo-circles">
                <div class="circle c-movie"></div>
                <div class="circle c-tv"></div>
                <div class="circle c-book"></div>
                <div class="circle c-album"></div>
                <div class="circle c-youtube"></div>
            </div>
        </div>
        <div class="nav-actions">
            <!-- Login remains -->
            <button id="login-btn" class="secondary-btn">Sign In</button>
            
            <div id="profile-menu" class="profile-dropdown" style="display:none;">
                <button class="profile-trigger" onclick="toggleProfileDropdown()">
                    <img src="https://ui-avatars.com/api/?name=User&background=0d0776&color=fff" id="nav-avatar" alt="Profile">
                    <span class="dropdown-arrow"></span>
                </button>
                <div id="dropdown-content" class="dropdown-content">
                    <a href="index.html">Home</a>
                    <a href="diary.html">Diary</a>
                    <a href="lists.html">Lists</a>
                    <a href="watchlist.html">Watchlist</a>
                    <a href="profile.html">Profile</a>
                    <a href="settings.html">Settings</a>
                    <hr>
                    <a href="#" onclick="signOut()">Sign Out</a>
                </div>
            </div>
        </div>
    </header>

    <main class="profile-container">
        <h1>My Watchlist</h1>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <p class="meta" id="watchlist-subtitle" style="margin: 0; border: none; padding: 0;">Loading...</p>
            <div class="filter-nav">
                <button id="btn-all" class="filter-btn active" onclick="filterWatchlist('all')">All</button>
                <button id="btn-movie" class="filter-btn" onclick="filterWatchlist('movie')">Movies</button>
                <button id="btn-tv" class="filter-btn" onclick="filterWatchlist('tv')">TV</button>
                <button id="btn-book" class="filter-btn" onclick="filterWatchlist('book')">Books</button>
                <button id="btn-album" class="filter-btn" onclick="filterWatchlist('album')">Music</button>
                <button id="btn-youtube" class="filter-btn" onclick="filterWatchlist('youtube')">YouTube</button>
            </div>
        </div>
        
        <div class="grid" id="watchlist-grid"></div>
        <div id="watchlist-pagination" style="display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 40px; margin-bottom: 20px;"></div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="scriptingWatchlist.js"></script>
</body>
</html>
